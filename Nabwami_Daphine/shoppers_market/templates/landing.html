{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEST SHOPPERS Market - Landing Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #eb7d2f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        .landing-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
        }

        .logo-circle {
            width: 280px;
            height: 280px;
            border: 18px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 40px auto;
            color: #fff;
        }

        .logo-content h1 {
            font-size: 4rem;
            font-weight: 700;
            margin: 0;
            line-height: 1;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.2);
        }

        .logo-content h3 {
            font-size: 2rem;
            font-weight: 600;
            margin-top: 10px;
            margin-bottom: 0;
        }

        .logo-content p {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin-top: -5px;
            margin-bottom: 0;
        }

        .join-btn {
            background: #efefef;
            border: none;
            padding: 20px 110px;
            border-radius: 8px;
            color: #eb7d2f;
            font-size: 1.6rem;
            font-weight: 600;
            transition: 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 50px;
        }

        .join-btn:hover {
            background: #ffffff;
            transform: scale(1.03);
        }

        @media(max-width:768px) {
            .logo-circle {
                width: 220px;
                height: 220px;
            }

            .logo-content h1 {
                font-size: 3rem;
            }

            .logo-content h3 {
                font-size: 1.5rem;
            }

            .logo-content p {
                font-size: 2.3rem;
            }

            .join-btn {
                padding: 16px 70px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="logo-circle">
            <div class="logo-content">
                <h1>BEST</h1>
                <h3>SHOPPERS</h3>
                <p>Market</p>
            </div>
        </div>

        <a href="{% url 'dashboard' %}" class="join-btn">
            JOIN NOW
        </a>
    </div>

</body>
</html>
